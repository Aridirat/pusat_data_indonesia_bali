name: CI — Build & Test

on:
  push:
    branches: ['**'] # Jalan di semua branch saat push
  pull_request:
    branches: [main] # Jalan saat ada PR ke main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # → ghcr.io/username/pusat_data_indonesia_bali

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Test — install deps, build assets, jalankan test
  # ──────────────────────────────────────────────────────────────
  test:
    name: Test (PHP 8.2)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, bcmath, gd, zip, intl, opcache, imagick
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets (Vite)
        run: npm run build
        env:
          DISABLE_WAYFINDER: true

      - name: Copy .env untuk testing
        run: cp .env.example .env

      - name: Generate APP_KEY
        run: php artisan key:generate

      - name: Jalankan migration untuk testing
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root

      - name: Jalankan tests
        run: php artisan test
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Docker Build & Push ke GHCR
  # Hanya jalan saat push ke main atau setup_cicd_github
  # ──────────────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test # Hanya jalan kalau job test LULUS
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/setup_cicd_github'

    permissions:
      contents: read
      packages: write # Izin push ke GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login ke GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Otomatis tersedia, tidak perlu buat manual

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DISABLE_WAYFINDER=true
          cache-from: type=gha # Pakai GitHub Actions cache
          cache-to: type=gha,mode=max # Simpan cache untuk build berikutnya
